# Declare sources: logs and traces, as the metrics are piped directly to Prometheus by OTel collector
otlp-pipeline:
  source:
    otlp:
      port: 21890
      ssl: false
  route:
    - logs: "getEventType() == \"LOG\""
    - traces: "getEventType() == \"TRACE\""
  sink:
    - pipeline:
        name: "otel-logs-pipeline"
        routes: ["logs"]
    - pipeline:
        name: "otel-traces-pipeline"
        routes: ["traces"]

otel-logs-pipeline:
  source:
    pipeline:
      name: "otlp-pipeline"
  processor:
    - copy_values:
        entries:
          - from_key: "time"
            to_key: "@timestamp"
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "admin"
        password: "MyStr0ng!Pass#2024"
        insecure: true
        index_type: log-analytics-plain

otel-traces-pipeline:
  source:
    pipeline:
      name: "otlp-pipeline"
  sink:
    - pipeline:
        name: "traces-raw-pipeline"
    - pipeline:
        name: "service-map-pipeline"

traces-raw-pipeline:
  source:
    pipeline:
      name: "otel-traces-pipeline"
# otel_trace_raw processor — Converts OTLP trace spans into the flat document format that OpenSearch expects.
# Each span becomes one document with fields like traceId, spanId, serviceName, durationInNanos, etc.
  processor:
    - otel_traces:
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "admin"
        password: "MyStr0ng!Pass#2024"
        insecure: true
        index_type: trace-analytics-plain-raw

service-map-pipeline:
  delay: 100
  source:
    pipeline:
      name: "otel-traces-pipeline"
  processor:
    - otel_apm_service_map:
        window_duration: 10s
  route:
    - otel_apm_service_map_route: 'getEventType() == "SERVICE_MAP"'
    - service_processed_metrics: 'getEventType() == "METRIC"'
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "admin"
        password: "MyStr0ng!Pass#2024"
        insecure: true
        index_type: otel-v2-apm-service-map
        routes: [otel_apm_service_map_route]
    - prometheus:
        url: "http://prometheus:9090/api/v1/write"
        insecure: true
        threshold:
          max_events: 500
          flush_interval: 5s
        routes: [service_processed_metrics]