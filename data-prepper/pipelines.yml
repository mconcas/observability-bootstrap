# Declare sources: logs and traces, as the metrics are piped directly to Prometheus by OTel collector
otlp-pipeline:
  source:
    otlp:
      port: 21890
      ssl: false
  route:
    - logs: "getEventType() == \"LOG\""
    - traces: "getEventType() == \"TRACE\""
  sink:
    - pipeline:
        name: "otel-logs-pipeline"
        routes: ["logs"]
    - pipeline:
        name: "otel-traces-pipeline"
        routes: ["traces"]

otel-logs-pipeline:
  source:
    pipeline:
      name: "otlp-pipeline"
  processor:
    - copy_values:
        entries:
          - from_key: "time"
            to_key: "@timestamp"
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "admin"
        password: "MyStr0ng!Pass#2024"
        insecure: true
        index_type: log-analytics-plain

otel-traces-pipeline:
  source:
    pipeline:
      name: "otlp-pipeline"
  sink:
    - pipeline:
        name: "traces-raw-pipeline"
    - pipeline:
        name: "service-map-pipeline"

traces-raw-pipeline:
  source:
    pipeline:
      name: "otel-traces-pipeline"
# otel_trace_raw processor — Converts OTLP trace spans into the flat document format that OpenSearch expects.
# Each span becomes one document with fields like traceId, spanId, serviceName, durationInNanos, etc.
  processor:
    - otel_traces:
    - copy_values:
        entries:
          - from_key: "startTime"
            to_key: "time"
          - from_key: "startTime"
            to_key: "@timestamp"
    # traceGroup is the root span name — required by OpenSearch APM services view.
    # Data Prepper 2.x no longer sets it automatically; set it from span name for
    # root spans (parentSpanId empty) and leave child spans for ISM backfill.
    - add_entries:
        entries:
          - key: "traceGroup"
            value_expression: '/name'
            add_when: '/parentSpanId == ""'
          - key: "traceGroupFields/endTime"
            value_expression: '/endTime'
            add_when: '/parentSpanId == ""'
          - key: "traceGroupFields/durationInNanos"
            value_expression: '/durationInNanos'
            add_when: '/parentSpanId == ""'
          - key: "traceGroupFields/statusCode"
            value_expression: '/status/code'
            add_when: '/parentSpanId == ""'
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "admin"
        password: "MyStr0ng!Pass#2024"
        insecure: true
        index_type: trace-analytics-plain-raw

service-map-pipeline:
  delay: 100
  source:
    pipeline:
      name: "otel-traces-pipeline"
  processor:
    - otel_apm_service_map:
        window_duration: 10s
  route:
    - otel_apm_service_map_route: 'getEventType() == "SERVICE_MAP"'
    - service_processed_metrics: 'getEventType() == "METRIC"'
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        username: "admin"
        password: "MyStr0ng!Pass#2024"
        insecure: true
        index_type: otel-v2-apm-service-map
        routes: [otel_apm_service_map_route]
    - prometheus:
        url: "http://prometheus:9090/api/v1/write"
        insecure: true
        threshold:
          max_events: 500
          flush_interval: 5s
        routes: [service_processed_metrics]