services:
  fluent-bit:
    image: fluent/fluent-bit:${FLUENTBIT_VERSION}
    container_name: fluent-bit
    command:
      - /fluent-bit/bin/fluent-bit
      - -c
      - /etc/fluent-bit/fluent-bit.yml
    ports:
      - "24224:24224"
    volumes:
     - ./fluent-bit/fluent-bit.yml:/etc/fluent-bit/fluent-bit.yml

  opensearch:
    image: ${OPENSEARCH_DOCKER_REPO}/opensearch:${OPENSEARCH_VERSION}
    container_name: opensearch
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.opensearch
    depends_on:
      fluent-bit:
        condition: service_started
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms8g -Xmx8g"
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}"
      # Master key for Direct Query datasources plugin (Prometheus, S3, etc.)
      # Without this, OSD cannot register Prometheus as a data-connection.
      - plugins.query.datasources.encryption.masterkey=BTqK4Ytdz67La1kShIKV3Pu9
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: curl -s -k -u admin:${OPENSEARCH_PASSWORD} https://localhost:9200/_cluster/health | grep -qE '"status":"(green|yellow)"'
      start_period: 30s
      interval: 5s
      timeout: 10s
      retries: 10

  opensearch-dashboards:
    image: ${OPENSEARCH_DOCKER_REPO}/opensearch-dashboards:${OPENSEARCH_DASHBOARDS_VERSION}
    container_name: opensearch-dashboards
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=https://opensearch:9200
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
    volumes:
        - ./opensearch-dashboards/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml:ro
    depends_on:
      opensearch:
        condition: service_healthy
      fluent-bit:
        condition: service_started
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: prometheus
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-otlp-receiver
      - --web.enable-remote-write-receiver
      - --storage.tsdb.retention.time=15d
    ports:
     - "9090:9090"
    volumes:
      - prometheus-data:/prometheus # docker volume
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro # local volume
    depends_on:
      fluent-bit:
        condition: service_started
    healthcheck:
      test: wget -q --spider http://localhost:9090/-/healthy
      start_period: 30s
      interval: 5s
      timeout: 10s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_CONTRIB_VERSION}
    container_name: otel-collector
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.otel-collector
    command:
     - --config=/etc/otelcol-contrib/config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      - ./otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      data-prepper:
        condition: service_started
      prometheus:
        condition: service_healthy
    healthcheck:
      disable: true

  data-prepper:
    image: opensearchproject/data-prepper:${DATA_PREPPER_VERSION}
    container_name: data-prepper
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.data-prepper
    volumes:
      - ./data-prepper/pipelines.yml:/usr/share/data-prepper/pipelines/pipelines.yml:ro
      - ./data-prepper/data-prepper-config.yml:/usr/share/data-prepper/config/data-prepper-config.yaml:ro
    depends_on:
      opensearch:
        condition: service_healthy
      fluent-bit:
        condition: service_started

  # One-shot init container: registers Prometheus data source + index patterns in OSD
  # Uses python:3-alpine because we need both curl and python3 for JSON parsing.
  opensearch-dashboards-init:
    image: python:3-alpine
    container_name: opensearch-dashboards-init
    entrypoint: ["sh", "-c", "apk add --no-cache curl >/dev/null 2>&1 && sh /init-datasource.sh"]
    environment:
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
    volumes:
      - ./opensearch-dashboards/init-datasource.sh:/init-datasource.sh:ro
    depends_on:
      opensearch-dashboards:
        condition: service_started
    restart: "no"

networks:
  default:
    name: ${NETWORK_NAME}

volumes:
  opensearch-data:
  prometheus-data: