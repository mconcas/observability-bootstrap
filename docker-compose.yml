services:
  fluent-bit:
    image: fluent/fluent-bit:${FLUENTBIT_VERSION}
    container_name: fluent-bit
    command:
      - /fluent-bit/bin/fluent-bit
      - -c
      - /etc/fluent-bit/fluent-bit.yml
    ports:
      - "24224:24224"
    volumes:
     - ./fluent-bit/fluent-bit.yml:/etc/fluent-bit/fluent-bit.yml
     - ./fluent-bit/parsers.yml:/etc/fluent-bit/parsers.yml
     - fluentbit-socket:/tmp/fluent-bit-socket

  opensearch:
    image: ${OPENSEARCH_DOCKER_REPO}/opensearch:${OPENSEARCH_VERSION}
    container_name: opensearch
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.opensearch
    depends_on:
      fluent-bit:
        condition: service_started
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms8g -Xmx8g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - ./opensearch/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -qE '"status":"(green|yellow)"'
      start_period: 30s
      interval: 5s
      timeout: 10s
      retries: 10

  opensearch-dashboards:
    image: ${OPENSEARCH_DOCKER_REPO}/opensearch-dashboards:${OPENSEARCH_DASHBOARDS_VERSION}
    container_name: opensearch-dashboards
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    volumes:
        - ./opensearch-dashboards/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml:ro
    depends_on:
      opensearch:
        condition: service_healthy
      fluent-bit:
        condition: service_started
  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: prometheus
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-otlp-receiver
      - --web.enable-remote-write-receiver
      - --storage.tsdb.retention.time=15d
    ports:
     - "9090:9090"
    volumes:
      - prometheus-data:/prometheus # docker volume
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro # local volume
    depends_on:
      fluent-bit:
        condition: service_started
    healthcheck:
      test: wget -q --spider http://localhost:9090/-/healthy
      start_period: 30s
      interval: 5s
      timeout: 10s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:${OTEL_COLLECTOR_CONTRIB_VERSION}
    container_name: otel-collector
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.otel-collector
    command:
     - --config=/etc/otelcol-contrib/config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      - ./otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      data-prepper:
        condition: service_started
      prometheus:
        condition: service_healthy
    healthcheck:
      disable: true

  data-prepper:
    image: opensearchproject/data-prepper:${DATA_PREPPER_VERSION}
    container_name: data-prepper
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.data-prepper
    volumes:
      - ./data-prepper/pipelines.yml:/usr/share/data-prepper/pipelines/pipelines.yml:ro
      - ./data-prepper/data-prepper-config.yml:/usr/share/data-prepper/config/data-prepper-config.yaml:ro
    depends_on:
      opensearch:
        condition: service_healthy
      fluent-bit:
        condition: service_started

  # Periodic enricher: resolves OTLP span links → service-map edges for fan-in
  # topology (e.g. B→D in a diamond A→B,A→C,B→D,C→D) that Data-Prepper's
  # otel_apm_service_map processor cannot derive from parent-child spans alone.
  service-map-enricher:
    image: python:3-alpine
    container_name: service-map-enricher
    entrypoint: ["python3", "/enrich.py"]
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - ENRICH_INTERVAL_SECONDS=30
      - LOOKBACK_MINUTES=30
      - PROCESSING_BUFFER_MIN=10
      - MIN_AGE_MINUTES=10
    volumes:
      - ./service-map-enricher/enrich.py:/enrich.py:ro
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        fluentd-async: "true"
        tag: docker.service-map-enricher

  # One-shot init container: registers Prometheus data source + index patterns in OSD
  # Uses python:3-alpine because we need both curl and python3 for JSON parsing.
  opensearch-dashboards-init:
    image: python:3-alpine
    container_name: opensearch-dashboards-init
    entrypoint: ["python3", "/init-datasource.py"]
    volumes:
      - ./opensearch-dashboards/init-datasource.sh:/init-datasource.sh:ro
      - ./opensearch-dashboards/init-datasource.py:/init-datasource.py:ro
    depends_on:
      opensearch-dashboards:
        condition: service_started
    restart: "no"

networks:
  default:
    name: ${NETWORK_NAME}

volumes:
  opensearch-data:
  prometheus-data:
  fluentbit-socket: