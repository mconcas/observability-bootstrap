receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25 # sudden bursts
  batch:
    timeout: 10s
    send_batch_size: 1024
  resourcedetection: # not sure it is necessary at this point yet
    detectors: [env, system]
  # Transform processor: sets peer.service on CLIENT spans so that
  # Data Prepper's otel_apm_service_map processor can build destination
  # nodes in the Application Map topology.
  # Without peer.service, the service map only shows source-only edges.
  transform/peer_service:
    trace_statements:
      - context: span
        statements:
          # HTTP exporters: server.address is the hostname (e.g., "prometheus")
          - set(attributes["peer.service"], attributes["server.address"]) where kind == SPAN_KIND_CLIENT and attributes["server.address"] != nil
          # gRPC exporters: Go gRPC resolves hostname → IP before the span is created,
          # so server.address is an IP. Fix by mapping the known port to the service name.
          - set(attributes["peer.service"], "data-prepper") where kind == SPAN_KIND_CLIENT and attributes["server.port"] == 21890
  # Fix OpenSearch mapping conflict: otelcol.signal (keyword) vs
  # otelcol.signal.output (sub-field) in instrumentationScope.attributes.
  # Flatten dot-separated scope attribute names to underscores.
  transform/flatten_scope:
    log_statements:
      - context: scope
        statements:
          - set(attributes["otelcol.signal_output"], attributes["otelcol.signal.output"]) where attributes["otelcol.signal.output"] != nil
          - delete_key(attributes, "otelcol.signal.output") where attributes["otelcol.signal.output"] != nil
  # Extract service identity from InfoLogger's "facility" body field so that
  # OSD Trace Analytics can correlate logs ↔ services.
  # DPL sets InfoLoggerContext::Facility = DeviceSpec::name, which is the same
  # value used as the OTLP service.name in the tracing SDK.
  # Step 1: copy body["facility"] into a log-record attribute.
  # Step 2: groupbyattrs (below) promotes it to resource.attributes and regroups
  #         log records so each unique facility gets its own resource scope.
  transform/logs_service:
    log_statements:
      - context: log
        statements:
          - set(attributes["service.name"], attributes["facility"]) where attributes["facility"] != nil and attributes["service.name"] == nil
          # Map InfoLogger single-letter severity to OTLP severity_text / severity_number
          - set(severity_text, "DEBUG")  where attributes["severity"] == "D"
          - set(severity_number, SEVERITY_NUMBER_DEBUG)  where attributes["severity"] == "D"
          - set(severity_text, "INFO")   where attributes["severity"] == "I"
          - set(severity_number, SEVERITY_NUMBER_INFO)   where attributes["severity"] == "I"
          - set(severity_text, "WARN")   where attributes["severity"] == "W"
          - set(severity_number, SEVERITY_NUMBER_WARN)   where attributes["severity"] == "W"
          - set(severity_text, "ERROR")  where attributes["severity"] == "E"
          - set(severity_number, SEVERITY_NUMBER_ERROR)  where attributes["severity"] == "E"
          - set(severity_text, "FATAL")  where attributes["severity"] == "F"
          - set(severity_number, SEVERITY_NUMBER_FATAL)  where attributes["severity"] == "F"
  groupbyattrs/logs:
    keys:
      - service.name

exporters:
  otlp_http/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
    tls:
      insecure: true
  otlp_grpc/data-prepper:
    endpoint: data-prepper:21890
    tls:
      insecure: true

connectors:
  spanmetrics:
    histogram:
      explicit:
        buckets: [5ms, 10ms, 50ms, 100ms, 1s, 5s, 10s]

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    logs:
      level: warn
    traces:
      level: none

  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, transform/peer_service, memory_limiter, batch]
      exporters: [otlp_grpc/data-prepper, spanmetrics]
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [resourcedetection, memory_limiter, batch]
      exporters: [otlp_http/prometheus]
      # exporters: [otlp_http/prometheus, otlp_grpc/data-prepper]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, transform/flatten_scope, transform/logs_service, groupbyattrs/logs, memory_limiter, batch]
      exporters: [otlp_grpc/data-prepper]