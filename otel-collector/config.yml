receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25 # sudden bursts
  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  debug:
    verbosity: detailed
  otlp_http/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
    tls:
      insecure: true
  otlp_grpc/data-prepper:
    endpoint: data-prepper:21890
    tls:
      insecure: true

connectors:
  spanmetrics:
    histogram:
      explicit:
        buckets: [5ms, 10ms, 50ms, 100ms, 1s, 5s, 10s]

service:
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    traces:
      level: normal
      processors:
        - batch:
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://data-prepper:21890
                insecure: true

  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp_grpc/data-prepper, spanmetrics, debug]
    metrics:
      receivers: [otlp, spanmetrics]
      exporters: [otlp_http/prometheus, debug]
    logs:
      receivers: [otlp]
      exporters: [otlp_grpc/data-prepper, debug]