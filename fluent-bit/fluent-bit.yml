service:
  flush: 5
  log_level: info

pipeline:
  inputs:
    # Receives logs from Docker's fluentd logging driver over the network.
    # Works on Linux, macOS, and Windows — no host path mounts needed.
    - name: forward
      listen: 0.0.0.0
      port: 24224

  outputs:
    - name: opentelemetry
      match: "*"
      host: otel-collector
      port: 4318
      logs_uri: /v1/logs