parsers:
  - name: infologger_syslog_parser
    format: regex
    regex: /^\<(?<pri>[0-9]{1,5})\>1 (?<time>[^ ]+) (?<host>[^ ]+) (?<ident>[^ ]+) (?<pid>[-0-9]+) (?<msgid>[^ ]+) (?<extradata>(\[(.*?)\]|-)) (?<message>.+)$/
    time_key: time
    time_format: "%Y-%m-%dT%H:%M:%S.%LZ"

  - name: infologger_json
    format: json